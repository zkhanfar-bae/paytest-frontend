<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PayTest — Gateway Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://flex.cybersource.com/cybersource-unified-checkout.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #0d0f14; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #161a23; padding: 30px; border-radius: 12px; width: 100%; max-width: 380px; border: 1px solid #2a3040; }
    #payment-form { margin: 20px 0; min-height: 100px; border: 1px dashed #2a3040; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #7a8499; }
    button { width: 100%; padding: 15px; background: #4f8ef7; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="text-align:center">Complete Payment</h2>
    <div id="payment-form">Initializing secure session...</div>
    <div id="error-display" class="error-msg"></div>
    <button id="pay-btn" onclick="handlePayment()">Pay JOD 0.10</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
